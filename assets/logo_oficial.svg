<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background Color from Image -->
  <rect width="400" height="400" fill="#061b36" />
  
  <g font-family="Arial, Helvetica, sans-serif" font-weight="900" fill="#FFFFFF">
    <!-- "NE" -->
    <text x="35" y="195" font-size="110" letter-spacing="-3">NE</text>
    <!-- "O" -->
    <text x="270" y="195" font-size="110">O</text>
    <!-- "LABURO" -->
    <text x="35" y="285" font-size="78" letter-spacing="3">LABURO</text>
  </g>

  <!-- The "X" made of 4 inward-pointing arrows -->
  <!-- Center is at x=225, y=155. The cyan color matches the user image. -->
  <g transform="translate(210, 155) scale(1)" fill="#11C0EC">
    <!-- Top-Left arrow pointing to center -->
    <path d="M-18,-15 L0,5 L18,-15 L7,-15 L7,-55 L-7,-55 L-7,-15 Z" transform="rotate(135)" />
    <!-- Top-Right arrow -->
    <path d="M-18,-15 L0,5 L18,-15 L7,-15 L7,-55 L-7,-55 L-7,-15 Z" transform="rotate(225)" />
    <!-- Bottom-Right arrow -->
    <path d="M-18,-15 L0,5 L18,-15 L7,-15 L7,-55 L-7,-55 L-7,-15 Z" transform="rotate(315)" />
    <!-- Bottom-Left arrow -->
    <path d="M-18,-15 L0,5 L18,-15 L7,-15 L7,-55 L-7,-55 L-7,-15 Z" transform="rotate(45)" />
  </g>
</svg>
